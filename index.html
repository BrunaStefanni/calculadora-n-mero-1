<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        .fundo {
            background-image:linear-gradient(45deg, rgb(100, 6, 100), rgb(219, 130, 12));
            height: 100vh;
            color: white;
            font-family: fantasy;
        }
        .calculadora {
            position: absolute;
            background-color: rgb(51, 32, 51);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 20px;
            padding: 6px;
        }
        .botao {
            width: 50px;
            height: 50px;
            font-size: 30px;
            cursor: pointer;
            background-color: rgb(228, 73, 45);
            border: none;
            color: white;
            font-family: fantasy;
        }
        .botao:hover {
            background-color: rgb(84, 54, 84);

        }
    </style>
</head>
<body>
    <div class="fundo">
        <h1>Bruna Leite</h1>
        <div class="calculadora">
            <h1>Calculadora</h1>
            <p id="resultado">0</p>
            <table>
                <tr>
                    <td><button class="botao">C</button></td>
                    <td><button class="botao"><</button></td>
                    <td><button class="botao">/</button></td>
                    <td><button class="botao">X</button></td>

                </tr>
                <tr>
                    <td><button class="botao">7</button></td>
                    <td><button class="botao">8</button></td>
                    <td><button class="botao">9</button></td>
                    <td><button class="botao">-</button></td>
                </tr>
                <tr>
                    <td><button class="botao">4</button></td>
                    <td><button class="botao">5</button></td>
                    <td><button class="botao">6</button></td>
                    <td><button class="botao">+</button></td>
                </tr>
                <tr>
                    <td><button class="botao">1</button></td>
                    <td><button class="botao">2</button></td>
                    <td><button class="botao">3</button></td>
                    <td rowspan="2"><button class="botao">=</button></td>
                </tr>
                <tr>
                    <td colspan="2"><button class="botao">0</button></td>
                    <td><button class="botao">.</button></td>
                </tr>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
