<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        .fundo {
            background-image:linear-gradient(45deg, rgb(100, 6, 100), rgb(219, 130, 12));
            height: 100vh;
            color: white;
            font-family: fantasy;
            text-align: center;
        }
        .calculadora {
            position: absolute;
            background-color: rgb(51, 32, 51);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 10px;
            padding: 6px;
        }
        .botao {
            width: 50px;
            height: 50px;
            font-size: 30px;
            cursor: pointer;
            background-color: rgba(146, 15, 57, 0.8);
            border: none;
            border-radius: 5px;
            margin: 1px;
            color: white;
            font-family: fantasy;
        }
        .botao:hover {
            background-color: rgb(158, 105, 158);
        }
        #resultado {
            background-color: rgba(255, 255, 255, 0.8);
            width: 207px;
            height: 60px;
            margin-bottom: 5px;
            font-size: 50px;
            color: rgb(82, 8, 31);
            text-align: right;
            padding-right: 10px;
            border-radius: 8px;
        }
        .titulo {
            font-size: 33px;
            color: rgba(255, 255, 255, 0.3);
            font-family: calisto Mt;
        }
        .tituloC {
            font-size: 26px;
            color: rgb(255, 255, 255);
            font-family: calisto Mt;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="fundo">
        <h1 class="titulo">Bruna Leite</h1>
        
        <div class="calculadora">
            <h1 class="tituloC">Calculadora</h1>
            <p id="resultado">0</p>
            <table>
                <tr>
                    <td><button class="botao" onclick="clean()">C</button></td>
                    <td><button class="botao" onclick="backspace()">←</button></td>
                    <td><button class="botao" onclick="insert('/')">/</button></td>
                    <td><button class="botao" onclick="insert('*')">X</button></td>

                </tr>
                <tr>
                    <td><button class="botao" onclick="insert(7)">7</button></td>
                    <td><button class="botao" onclick="insert(8)">8</button></td>
                    <td><button class="botao" onclick="insert(9)">9</button></td>
                    <td><button class="botao" onclick="insert('-')">-</button></td>
                </tr>
                <tr>
                    <td><button class="botao" onclick="insert(4)">4</button></td>
                    <td><button class="botao" onclick="insert(5)">5</button></td>
                    <td><button class="botao" onclick="insert(6)">6</button></td>
                    <td><button class="botao" onclick="insert('+')">+</button></td>
                </tr>
                <tr>
                    <td><button class="botao" onclick="insert(1)">1</button></td>
                    <td><button class="botao" onclick="insert(2)">2</button></td>
                    <td><button class="botao" onclick="insert(3)">3</button></td>
                    <td rowspan="2"><button class="botao" style="height: 103px;" onclick="calculate()">=</button></td>
                </tr>
                <tr>
                    <td colspan="2"><button class="botao" style="width: 103px;" onclick="insert(0)">0</button></td>
                    <td><button class="botao" onclick="insert('.')">.</button></td>
                </tr>
                </tr>
            </table>
        </div>
    </div>
    <script>
        function insert(num) 
        {
           var numero = document.getElementById('resultado').innerHTML;
           document.getElementById('resultado').innerHTML = numero + num;
        }
        function clean() 
        {
            document.getElementById('resultado').innerHTML = "";
        }
        function backspace() 
        {
            var resultado = document.getElementById('resultado').innerHTML;
            document.getElementById('resultado').innerHTML = resultado.substring(0, resultado.length -1);
        }
        function calculate() 
        {
            var resultado = document.getElementById('resultado').innerHTML;
            if(resultado)
            {
                document.getElementById('resultado').innerHTML = eval(resultado);
            }
            else
            {
                document.getElementById('resultado').innerHTML = "ZERO";
            }
        }
    </script>
</body>
</html>
